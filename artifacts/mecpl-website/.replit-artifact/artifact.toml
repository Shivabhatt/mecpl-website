kind = "web"
previewPath = "/"
title = "MECPL Website"
version = "1.0.0"
id = "artifacts/mecpl-website"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18199

[services.development]
run = "pnpm --filter @workspace/mecpl-website run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/mecpl-website", "run", "build" ]
publicDir = "artifacts/mecpl-website/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18199"
BASE_PATH = "/"
